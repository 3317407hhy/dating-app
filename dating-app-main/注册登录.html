function goToStep(n){currentStep=n;document.querySelectorAll(".onboarding-step").forEach(function(s){s.classList.toggle("active",parseInt(s.dataset.step)===n)})}
document.querySelectorAll(".mbti-option").forEach(function(b){b.addEventListener("click",function(){document.querySelectorAll(".mbti-option").forEach(function(x){x.classList.remove("selected")});this.classList.add("selected");regData.mbti=this.dataset.mbti;regData.mbtiUnknown=false;document.getElementById("mbtiSkipBtn").classList.remove("selected")})});
function setMbtiUnknown(){document.querySelectorAll(".mbti-option").forEach(function(b){b.classList.remove("selected")});regData.mbti="";regData.mbtiUnknown=true;document.getElementById("mbtiSkipBtn").classList.add("selected");showToast("已跳过MBTI，之后可以在个人资料中设置")}
document.querySelectorAll("[data-gender]").forEach(function(b){b.addEventListener("click",function(){document.querySelectorAll("[data-gender]").forEach(function(x){x.classList.remove("selected")});this.classList.add("selected");regData.gender=this.dataset.gender})});
document.querySelectorAll(".interest-tag").forEach(function(t){t.addEventListener("click",function(){this.classList.toggle("selected");var v=this.dataset.interest,i=regData.interests.indexOf(v);i!==-1?regData.interests.splice(i,1):regData.interests.push(v)})});
document.querySelectorAll(".need-option").forEach(function(o){o.addEventListener("click",function(){document.querySelectorAll(".need-option").forEach(function(x){x.classList.remove("selected")});this.classList.add("selected");regData.need=this.dataset.need})});
function handleRegister(){if(!regData.need){showToast("请选择你的恋爱需求类型","error");return}var btn=document.getElementById("registerSubmit");btn.disabled=true;btn.innerHTML="<span class=\"spinner\"></span> 注册中…";var ud={name:regData.name,email:regData.email,password:regData.password,gender:regData.gender,mbti:regData.mbti||"未知",mbtiUnknown:regData.mbtiUnknown,interests:regData.interests,need:regData.need,handle:"@"+regData.name.replace(/\s/g,"").toLowerCase()+Math.random().toString(36).slice(2,5),avatarChar:regData.name.charAt(0),registeredAt:new Date().toISOString()};localStorage.setItem("zx_user",JSON.stringify(ud));setTimeout(function(){btn.disabled=false;btn.textContent="完成注册";showToast("\u2705 注册成功！正在跳转…");setTimeout(function(){window.location.href="\u4e3b\u9875.html"},1200)},1500)}
function handleLogin(e){e.preventDefault();var em=document.getElementById("loginEmail").value.trim(),pw=document.getElementById("loginPassword").value,err=false;if(!em||!em.includes("@")){document.getElementById("loginEmail").classList.add("error");document.getElementById("loginEmailError").classList.add("show");err=true}if(!pw){document.getElementById("loginPassword").classList.add("error");document.getElementById("loginPasswordError").classList.add("show");err=true}if(err)return;var btn=document.getElementById("loginSubmit");btn.disabled=true;btn.innerHTML="<span class=\"spinner\"></span> 登录中…";setTimeout(function(){var s=localStorage.getItem("zx_user");if(s){var u=JSON.parse(s);if(u.email===em){u.lastLogin=new Date().toISOString();localStorage.setItem("zx_user",JSON.stringify(u));showToast("\u2705 登录成功！");setTimeout(function(){window.location.href="\u4e3b\u9875.html"},1000)}else{btn.disabled=false;btn.textContent="登录";showToast("\u26a0\ufe0f 账号不存在，请先注册","error")}}else{var nu={name:em.split("@")[0],email:em,password:pw,handle:"@user_"+Math.random().toString(36).slice(2,6),mbti:"未知",interests:[],need:"",avatarChar:em.charAt(0).toUpperCase()};localStorage.setItem("zx_user",JSON.stringify(nu));showToast("\u2705 登录成功！");setTimeout(function(){window.location.href="\u4e3b\u9875.html"},1000)}},1500)}

function showToast(m,t){var o=document.getElementById("toast");o.textContent=m;o.className="toast"+(t==="error"?" error":"");o.classList.add("show");clearTimeout(o._timer);o._timer=setTimeout(function(){o.classList.remove("show")},2800)}
</script></body></html>
