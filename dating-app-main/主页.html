function renderMatches(filter){filter=filter||"all";var grid=document.getElementById("matchGrid");var items=matchUsers;if(filter==="similar"&&userData.mbti&&userData.mbti!=="未知"){items=matchUsers.filter(function(u){return u.mbti[0]===userData.mbti[0]})}if(filter==="complement"&&userData.mbti&&userData.mbti!=="未知"){items=matchUsers.filter(function(u){return u.mbti[0]!==userData.mbti[0]})}grid.innerHTML=items.map(function(u){var ints=u.interests.map(function(i){return"<span>"+i+"</span>"}).join(" ");return'<div class="match-card"><div class="mc-avatar" style="background:'+u.avatar+'">'+u.name.charAt(0)+'</div><div class="mc-name">'+u.name+'<span style="font-size:11px;color:var(--text-secondary)">，'+u.age+'</span></div><div class="mc-mbti">'+u.mbti+' · '+(u.need==="companion"?"🤗陪伴":u.need==="partner"?"🤝搭档":"✨吸引")+'</div><div class="mc-interests">'+ints+'</div><button class="mc-btn" onclick="showToast(\'✅ 已发送匹配请求给 '+u.name+'\')">打招呼</button></div>'}).join("")}
document.querySelectorAll(".mf-btn").forEach(function(b){b.addEventListener("click",function(){document.querySelectorAll(".mf-btn").forEach(function(x){x.classList.remove("active")});this.classList.add("active");renderMatches(this.dataset.mf)})})

function renderForum(cat){cat=cat||"all";var el=document.getElementById("forumPosts");var items=cat==="all"?forumPosts:forumPosts.filter(function(p){return p.cat===cat});el.innerHTML=items.map(function(p){var sil=p.silent?'<div class="pc-silent">🌿 只想倾诉，不需要建议</div>':"";return'<div class="post-card"><div class="pc-header"><div class="pc-avatar" style="background:linear-gradient(135deg,var(--accent),var(--purple))">?</div><span class="pc-anon">匿名用户</span><span class="pc-tag">#'+p.tag+'</span></div><div class="pc-text">'+p.text+'</div>'+sil+'<div class="pc-actions"><span>💬 '+p.comments+'</span><span>❤️ '+p.likes+'</span><span onclick="showToast(\'✅ 匹配请求已发送！\')">🤝 申请匹配</span></div></div>'}).join("")}
document.querySelectorAll(".forum-cat").forEach(function(b){b.addEventListener("click",function(){document.querySelectorAll(".forum-cat").forEach(function(x){x.classList.remove("active")});this.classList.add("active");renderForum(this.dataset.fc)})})
var topicQ="你会因为喜欢的声优坏坊而放弃作品吗？";var topicOpts=[{t:"会，无法直视了",pct:28},{t:"不会，作品和声优分开看",pct:45},{t:"看情况，看坏坊程度",pct:20},{t:"从来不在乎声优",pct:7}];var mbtiDist=["INTJ 12%","INTP 8%","ENTJ 5%","ENTP 6%","INFJ 15%","INFP 22%","ENFJ 4%","ENFP 10%","ISTJ 3%","ISFJ 5%","ESTJ 2%","ESFJ 3%","ISTP 2%","ISFP 1%","ESTP 1%","ESFP 1%"];var topicVoted=false;function renderTopic(){document.getElementById("topicDate").textContent="2026年6月8日";document.getElementById("topicQuestion").textContent=topicQ;document.getElementById("topicOptions").innerHTML=topicOpts.map(function(o,i){return'<div class="topic-opt" data-idx="'+i+'">'+o.t+'<div class="to-bar" style="width:0;background:linear-gradient(90deg,var(--accent),var(--purple))"></div><div class="to-pct" style="display:none">'+o.pct+'%</div></div>'}).join("");document.querySelectorAll(".topic-opt").forEach(function(el){el.addEventListener("click",function(){if(topicVoted)return;topicVoted=true;document.getElementById("topicQuestion").textContent="📊 投票结果";document.querySelectorAll(".topic-opt").forEach(function(o,j){var opt=topicOpts[j];o.classList.add("selected");o.querySelector(".to-bar").style.width=opt.pct+"%";o.querySelector(".to-pct").style.display="block";o.querySelector(".to-pct").textContent=opt.pct+"% ("+Math.floor(opt.pct*10)+"人)"});showToast("✅ 已投票！")})});document.getElementById("mbtiDist").innerHTML=mbtiDist.map(function(m){return'<span class="md-item">'+m+'</span>'}).join("")}

function openChatHelper(){var modal=document.getElementById("chatModal");modal.classList.toggle("show");if(modal.classList.contains("show")){document.getElementById("chatList").innerHTML=chatTopics.map(function(t){return'<div class="ch-item"><div class="ch-tag">#'+t.tag+'</div>'+t.text+'<button class="ch-send" onclick="showToast(\'✅ 已复制话题，快去聊天吧！\')"> 一键发送</button></div>'}).join("")}}

function renderSuggestions(){var el=document.getElementById("suggestUsers");var users=[{name:"小樱",handle:"@sakura_chan",mbti:"ENFP"},{name:"阿杰",handle:"@jie_otaku",mbti:"INTJ"},{name:"Momo",handle:"@momo_paint",mbti:"INFP"}];el.innerHTML=users.map(function(u){return'<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)"><div class="u-avatar" style="width:36px;height:36px;font-size:13px">'+u.name.charAt(0)+'</div><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600">'+u.name+'</div><div style="font-size:11px;color:var(--text-secondary)">'+u.handle+' · '+u.mbti+'</div></div><button style="padding:4px 14px;border-radius:var(--radius);border:1px solid var(--accent);background:transparent;color:var(--accent);font-size:11px;font-weight:600;cursor:pointer" onclick="showToast(\'✅ 已关注 '+u.name+'\')">关注</button></div>'}).join("")}
function showToast(msg,type){var t=document.getElementById("toast");t.textContent=msg;t.className="toast"+(type==="error"?" error":"");t.classList.add("show");clearTimeout(t._timer);t._timer=setTimeout(function(){t.classList.remove("show")},2800)}
function doSearch(){var v=document.getElementById("searchInput").value.trim();if(v){window.location.href='搜索.html?q='+encodeURIComponent(v)}else{showToast("请输入搜索关键词")}}
document.getElementById("searchInput").addEventListener("keydown",function(e){if(e.key==="Enter"){doSearch()}})

if(!userData.name||!userData.email){window.location.href="注册登录.html";return}
